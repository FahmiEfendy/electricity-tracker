server {
    listen 80;
    server_name electricity.fahmiefendy.dev;

    # Enable gzip compression for better loading performance
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript image/svg+xml image/png image/jpeg image/webp application/json;
    gzip_min_length 1000;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Forward real IP and headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
